name: Update Loto CSV Data

on:
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download lottery CSV data
        run: PYTHONIOENCODING=utf-8 python3 -m src.verification.update_data

      - name: Commit and push if changed
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add data/raw/
          git diff --cached --quiet && echo "差分なし - スキップ" || \
            git commit -m "auto: loto CSV更新 $(date '+%Y-%m-%d')" && git push
